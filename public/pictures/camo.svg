      <svg
        id="starfield"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 1920 1080"
        width="1920"
        height="1080"
        preserveAspectRatio="xMidYMid slice"
      >
        <defs>
          <!-- Soft glow filter for brighter stars -->
          <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur
              in="SourceGraphic"
              stdDeviation="1.5"
              result="blur"
            />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          <!-- Finer glow for medium stars -->
          <filter
            id="starGlowSm"
            x="-200%"
            y="-200%"
            width="500%"
            height="500%"
          >
            <feGaussianBlur
              in="SourceGraphic"
              stdDeviation="0.8"
              result="blur"
            />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>

          <!-- Nebula-like subtle cloud -->
          <filter id="nebula">
            <feTurbulence
              type="fractalNoise"
              baseFrequency="0.003"
              numOctaves="4"
              seed="42"
              result="noise"
            />
            <feColorMatrix
              type="saturate"
              values="0"
              in="noise"
              result="gray"
            />
            <feComponentTransfer in="gray" result="faint">
              <feFuncA type="linear" slope="0.03" intercept="0" />
            </feComponentTransfer>
            <feBlend in="SourceGraphic" in2="faint" mode="screen" />
          </filter>
        </defs>

        <!-- Very subtle nebula background layer -->
        <rect
          width="100%"
          height="100%"
          fill="rgb(26, 26, 26)"
          filter="url(#nebula)"
        />

        <!-- Star layers injected by the animator -->
        <g id="stars-deep"></g>
        <g id="stars-mid"></g>
        <g id="stars-near"></g>
        <g id="stars-bright"></g>
      </svg>
